services:
  app:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    container_name: kinetic-app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - /var/www/node_modules
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kinetic-network

  db:
    image: postgres:15-alpine
    container_name: kinetic-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-kinetic-crowd}
      - POSTGRES_USER=${DB_USERNAME:-kinetic}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-crowd}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kinetic-network

  reverb:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    container_name: kinetic-reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      - app
    networks:
      - kinetic-network

  web:
    image: nginx:alpine
    container_name: kinetic-web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./Docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - kinetic-network

  node:
    image: node:20-alpine
    container_name: kinetic-node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    networks:
      - kinetic-network

networks:
  kinetic-network:
    driver: bridge
